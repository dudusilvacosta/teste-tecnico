services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: adonis-api
    restart: unless-stopped
    ports:
      - "3333:3333"
    depends_on:
      - mysql
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      HOST: 0.0.0.0
      PORT: 3333
      DB_CONNECTION: mysql
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
      MYSQL_DB_NAME: app_db
    command: npm run dev

  frontend:
    build:
      context: ./frontend
    container_name: quasar-app
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: true
    command: quasar dev --host 0.0.0.0

volumes:
  mysql_data: